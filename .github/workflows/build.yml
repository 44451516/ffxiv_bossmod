name: Build & Publish Release

on:
  push:
    branches:
      - CN
  workflow_dispatch:
    inputs:
      testing:
        description: 'Testing release'
        required: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      completed: ${{ steps.metadata.outputs.completed }}
      version: ${{ steps.metadata.outputs.version }}
      release_type: ${{ steps.metadata.outputs.release_type }}
    env:
      DALAMUD_HOME: /tmp/dalamud
      PLUGIN_BUILD_DIR: /tmp/plugin-build
      PROJECT_FILE: BossMod/BossMod.csproj
      TESTING_RELEASE: ${{ github.ref == 'refs/heads/testing' || inputs.testing == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Read release metadata
        id: metadata
        shell: python
        run: |
          import os
          import xml.etree.ElementTree as ET

          project_file = os.environ["PROJECT_FILE"]
          root = ET.parse(project_file).getroot()

          def read_property(name):
              for element in root.iter():
                  if element.tag.split("}")[-1] == name and element.text:
                      return element.text.strip()
              return None

          version = read_property("AssemblyVersion") or read_property("Version")
          if not version:
              raise SystemExit(f"{project_file} does not define AssemblyVersion or Version")

          release_type = "testing" if os.environ["TESTING_RELEASE"].lower() == "true" else "latest"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("completed=true\n")
              output.write(f"version={version}\n")
              output.write(f"release_type={release_type}\n")

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud Latest
        run: |
          wget https://goatcorp.github.io/dalamud-distrib/latest.zip -O "${DALAMUD_HOME}.zip"
          unzip "${DALAMUD_HOME}.zip" -d "${DALAMUD_HOME}"

      - name: Restore Project
        run: dotnet restore

      - name: Build Project
        run: |
          dotnet build --configuration Release "${PROJECT_FILE}" --output "${PLUGIN_BUILD_DIR}"
          zip_path="$(find "${PLUGIN_BUILD_DIR}" -name latest.zip -print -quit)"
          if [ -z "${zip_path}" ]; then
            echo "latest.zip was not produced by the build" >&2
            exit 1
          fi
          cp "${zip_path}" latest.zip
          unzip -l latest.zip

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: latest_zip
          path: latest.zip

  make_release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.completed == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: latest_zip

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.build.outputs.version }}
          tag_name: ${{ needs.build.outputs.release_type == 'testing' && 't' || 'v' }}${{ needs.build.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.build.outputs.release_type == 'testing' }}
          files: latest.zip
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Trigger DalamudPlugins
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.DALAMUD_PLUGINS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/44451516-ff14/DalamudPlugins/actions/workflows/main.yml/dispatches \
            -d '{"ref":"master"}'
